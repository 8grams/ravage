[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
loglevel=info
stdout_logfile=/var/log/supervisor/supervisord.log
stdout_logfile_maxbytes=0
stderr_logfile=/var/log/supervisor/supervisord.log
stderr_logfile_maxbytes=0
pidfile=/var/run/supervisor/supervisord.pid 
childlogdir=/var/log/supervisor

[program:caddy]
directory=/etc/caddy
command=/usr/bin/caddy run --config /etc/caddy/Caddyfile
user=root
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/supervisord.log
stdout_logfile=/var/log/supervisor/supervisord.log

[program:ravage]
directory=/app
command=/app/ravage
user=root
stdout_logfile=/var/log/supervisor/supervisord.log
stdout_logfile_maxbytes=0
stderr_logfile=/var/log/supervisor/supervisord.log
stderr_logfile_maxbytes=0
autorestart=true
startretries=3

