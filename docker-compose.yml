version: '3.8'

services:
  ravage:
    build: .
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    volumes:
      - ./data:/opt/data
    ulimits:
      nofile:
        soft: 65536
        hard: 65536 