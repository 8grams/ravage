{% extends "base/base_app.html" %} {% block content %}
<main
  class="container mx-auto px-4 py-10 grid grid-cols-1 lg:grid-cols-12 gap-10"
>
  <aside class="col-span-1 lg:col-span-4 xl:col-span-3">
    {% include "components/aside.html" %}
  </aside>
  <section class="col-span-1 lg:col-span-8 xl:col-span-9">
    <div class="tabs tabs-lift">
      {% for request in requests %}
      <a
        href="/collections/{{request.collection_id}}?request={{request.id}}"
        role="tab"
        type="radio"
        name="main_tab"
        class="tab"
        >{{request.name}}</a
      >
      {% endfor %}
      <span class="tab tab-active">New Request</span>
      <div class="tab-content bg-base-100 border-base-300 p-6">
        {% include "components/request_form.html" %}
      </div>
    </div>
  </section>
</main>
{% endblock %}
