{% extends "base/base_app.html" %} {% block content %}
<main class="container mx-auto px-4 py-10">
  <div class="overflow-x-auto">
    <table class="table">
      <!-- head -->
      <thead>
        <tr>
          <th>Created</th>
          <th>Name</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <!-- row 1 -->
        {% for history in histories %}
        <tr>
          <td class="created-at" data-timestamp="{{history.created_at}}"></td>
          <td>{{history.name}}</td>
          <td>
            <div class="flex gap-4">
              <a class="link" target="_blank" href="{{history.log_path}}">Log</a>
              <a class="link" target="_blank" href="{{history.report_path}}">Report</a>
            </div>
          </td>
        </tr>
        {%endfor%}
      </tbody>
    </table>
  </div>
</main>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    const dateElements = document.querySelectorAll(".created-at");
    dateElements.forEach(function(element) {
      const timestamp = element.getAttribute("data-timestamp");
      const date = new Date(timestamp);
      element.textContent = date.toLocaleDateString() + " " + date.toLocaleTimeString();
    });
  });
</script>
{% endblock %}
