<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ravage</title>
    <link rel="icon" href="/static/icon.png" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script
      src="https://unpkg.com/htmx.org@2.0.4"
      integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
      crossorigin="anonymous"
    ></script>
    <script src="https://unpkg.com/htmx-ext-ws@2.0.2"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/json-enc.js"></script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <link href="/static/app.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/default.min.css"
    />
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <script>
      htmx.config.wsReconnectDelay = function (retryCount) {
        return retryCount * 1000; // return value in milliseconds
      };
      //observer
      const observer = new MutationObserver((mutationList, observer) => {
        for (let mutation of mutationList) {
          let { target } = mutation;
          if (target.children.length > 500) {
            target.removeChild(target.firstElementChild);
          }
          if (!target) {
            observer.disconnect();
          }
          target.scrollTop = target.scrollHeight;
        }
      });
      const config = {
        attributes: false,
        childList: true,
        subtree: false,
        characterData: false,
      };
    </script>
  </head>
  <body>
    {% block app %} {% endblock %}
    <div id="modal"></div>
  </body>
</html>
