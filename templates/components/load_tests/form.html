<div>
  <fieldset class="fieldset">
    <legend class="fieldset-legend text-base">Name</legend>
    <input
      type="text"
      class="input w-full"
      placeholder="Load test name"
      name="name"
      required
    />
  </fieldset>
  <div class="mt-8 font-semibold text-lg">Configuration</div>
  <div class="mt-4 space-y-4">
    <fieldset class="fieldset">
      <legend class="fieldset-legend text-base">Timeout</legend>
      <input
        type="text"
        class="input w-full"
        placeholder="100"
        min="1"
        value="100"
        name="timeout"
        required
      />
    </fieldset>
    <fieldset class="fieldset">
      <legend class="fieldset-legend text-base">Users</legend>
      <div class="flex gap-2 mt-4">
        <label class="floating-label">
          <span>Starts per second</span>
          <input
            type="number"
            class="input w-full"
            placeholder="Starts per second"
            min="1"
            value="1"
            required
            name="starts_per_second"
          />
        </label>
        <label class="floating-label">
          <span>Total users</span>
          <input
            type="number"
            class="input w-full"
            placeholder="Total users"
            name="total_users"
            value="1000"
            min="1"
            required
          />
        </label>
      </div>
    </fieldset>
    <fieldset class="fieldset">
      <legend class="fieldset-legend text-base">Run time</legend>
      <input
        type="number"
        class="input w-full"
        placeholder="Run time"
        min="1"
        name="runtime"
        value="10"
        required
      />
    </fieldset>
  </div>
</div>
