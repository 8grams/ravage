<form
  hx-post="/api/load_tests{% if load_test%}/{{load_test.id}}{%endif%}?refresh={%if load_test%}true{%else%}false{%endif%}"
>
  <div class="text-end">
    <button class="btn btn-neutral">Save</button>
    <button class="btn btn-success">Run</button>
  </div>
  <fieldset class="fieldset">
    <legend class="fieldset-legend">Name</legend>
    <input
      type="text"
      class="input w-full"
      placeholder="Load test name"
      name="name"
      required
    />
  </fieldset>
  <div class="mt-8 font-semibold">Configuration</div>
  <div class="mt-4 space-y-4">
    <fieldset class="fieldset">
      <legend class="fieldset-legend">Timeout</legend>
      <input
        type="text"
        class="input w-full"
        placeholder="100"
        min="1"
        name="timeout"
      />
    </fieldset>
    <fieldset class="fieldset">
      <legend class="fieldset-legend">Users</legend>
      <div class="flex gap-2">
        <label class="floating-label">
          <span>Starts per second</span>
          <input
            type="number"
            class="input w-full"
            placeholder="Starts per second"
            min="1"
            name="starts_per_second"
          />
        </label>
        <label class="floating-label">
          <span>Total users</span>
          <input
            type="number"
            class="input w-full"
            placeholder="Total users"
            name="total_users"
            min="1"
          />
        </label>
      </div>
    </fieldset>
    <fieldset class="fieldset">
      <legend class="fieldset-legend">Run time</legend>
      <input
        type="number"
        class="input w-full"
        placeholder="Run time"
        min="1"
        name="runtime"
      />
    </fieldset>
  </div>
</form>
