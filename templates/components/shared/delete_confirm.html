<div class="modal modal-open">
  <div class="modal-box">
    <h3 class="text-lg">Delete action</h3>
    <p class="my-4">Are you sure you want to delete this item?</p>
    <div class="modal-action">
      <button class="btn" onclick="this.closest('.modal').remove()">
        Cancel
      </button>
      <button class="btn btn-error" hx-delete="{{api_url}}">Continue</button>
    </div>
  </div>
</div>
