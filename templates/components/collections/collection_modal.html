<div class="modal-wrapper">
  <input type="checkbox" id="collection_modal" class="modal-toggle" checked />
  <div role="dialog" class="modal">
    <div class="modal-box">
      <h3 class="text-lg font-bold">
        {%if collection %}Edit{%else%}New{%endif%} Collection
      </h3>
      <form
        hx-ext="json-enc"
        hx-post="/api/collections{%if collection%}/{{collection.id}}{%endif%}?refresh=true"
        hx-swap="none"
        id="collection_form"
        class="my-8"
      >
        <div class="form space-y-4">
          <label class="floating-label">
            <span>Collection Name</span>
            <input
              required
              type="text"
              placeholder="Collection Name"
              class="input input-bordered w-full"
              name="name"
              value="{{collection.name | default(value='')}}"
            />
          </label>
          <label class="floating-label">
            <span>Base URL</span>
            <input
              required
              type="url"
              placeholder="Base URL"
              class="input input-bordered w-full"
              name="host"
              value="{{collection.host | default(value='')}}"
            />
          </label>
        </div>
        <div class="mt-8 mb-4">
          <label>Headers</label>
        </div>
        {% include "components/form_header.html" %}
      </form>
      <div class="modal-action">
        <!-- if there is a button in form, it will close the modal -->
        <label class="btn" for="collection_modal">Cancel</label>
        <button form="collection_form" type="submit" class="btn btn-neutral">
          Save
        </button>
      </div>
    </div>
    <label for="collection_modal" class="modal-backdrop">
      <span>close</span>
    </label>
  </div>
</div>
